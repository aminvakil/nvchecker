---
name: Docker
'on':
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  Docker:
    name: Docker
    runs-on: ubuntu-latest
    outputs:
      updates: ${{ steps.nvcheck.outputs.updates }}

    steps:
      - name: Check out the codebase.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Pull base image.
        run: docker pull quay.io/aminvakil/archlinux:latest

      - name: Run a container of base image and mount package on it.
        run: |
          container_id=$(mktemp)
          docker run --detach --privileged --cgroup-parent=docker.slice --cgroupns private --tmpfs /tmp --tmpfs /run --tmpfs /run/lock -v "${PWD}":/nvchecker quay.io/aminvakil/archlinux:latest > "${container_id}"
          printf 'container_id=%s\n' "$container_id" >> "$GITHUB_ENV"

      - name: pacman -Syu
        run: docker exec "$(cat ${container_id})" pacman -Syu --noconfirm

      - name: Install nvchecker and git.
        run: docker exec "$(cat ${container_id})" pacman -S nvchecker git jq pyalpm --noconfirm

      - name: Nvcheck!
        id: nvcheck
        run: |
          docker exec "$(cat ${container_id})" nvchecker --failures -c /nvchecker/docker.toml
          docker_nvcmp_json=$(docker exec "$(cat ${container_id})" nvcmp -j -c /nvchecker/docker.toml)
          updates=$(echo "$docker_nvcmp_json" | docker exec -i "$(cat ${container_id})" jq -c '[.[]]')
          printf 'updates<<EOF\n%s\nEOF\n' "$updates" >> "$GITHUB_OUTPUT"

      - name: Stop and remove container forcefully.
        run: docker rm -f "$(cat ${container_id})"

  Create-Docker-Pull-Requests:
    name: Create Docker Pull Request for ${{ matrix.update.name }}
    needs: Docker
    if: needs.Docker.outputs.updates != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        update: ${{ fromJson(needs.Docker.outputs.updates) }}
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Pull base image.
        run: docker pull quay.io/aminvakil/archlinux:latest

      - name: Run a container of base image and mount package on it.
        run: |
          container_id=$(mktemp)
          docker run --detach --privileged --cgroup-parent=docker.slice --cgroupns private --tmpfs /tmp --tmpfs /run --tmpfs /run/lock -v "${PWD}":/nvchecker quay.io/aminvakil/archlinux:latest > "${container_id}"
          printf 'container_id=%s\n' "$container_id" >> "$GITHUB_ENV"

      - name: pacman -Syu
        run: docker exec "$(cat ${container_id})" pacman -Syu --noconfirm

      - name: Install nvchecker and git.
        run: docker exec "$(cat ${container_id})" pacman -S nvchecker git jq pyalpm --noconfirm

      - name: Prepare Docker bump
        run: |
          docker exec "$(cat ${container_id})" nvchecker --failures -c /nvchecker/docker.toml
          docker exec "$(cat ${container_id})" nvtake -c /nvchecker/docker.toml "${{ matrix.update.name }}"
          docker exec "$(cat ${container_id})" rm -f /nvchecker/docker_old.txt~ /nvchecker/docker_new.txt
          safe_name=$(printf '%s' "${{ matrix.update.name }}" | tr -c 'A-Za-z0-9._-' '-' | sed 's/^-*//; s/-*$//')
          printf 'branch_name=%s\n' "dockerbump-${safe_name}" >> "$GITHUB_ENV"
          printf 'commit_message=%s\n' "${{ matrix.update.name }} ${{ matrix.update.oldver }} -> ${{ matrix.update.newver }}" >> "$GITHUB_ENV"

      - name: Create Docker Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: 'Docker Bump: ${{ matrix.update.name }}'
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            printf 'No changes to commit.\n'
            exit 0
          fi

          git config user.name "GitHub"
          git config user.email "noreply@github.com"
          git checkout -B "$branch_name"
          git add -A
          git commit --author="${GITHUB_ACTOR} <${GITHUB_ACTOR}@users.noreply.github.com>" -m "$commit_message"
          git push --force origin "$branch_name"

          pr_number=$(gh pr list --head "$branch_name" --state open --json number --jq '.[0].number // empty')
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" --base main --title "$PR_TITLE" --body "$commit_message"
          else
            gh pr create --base main --head "$branch_name" --title "$PR_TITLE" --body "$commit_message"
          fi

      - name: Stop and remove container forcefully.
        run: docker rm -f "$(cat ${container_id})"
