---
name: Docker Other Repos
'on':
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'

jobs:

  Docker_Other_Repos:
    name: Docker-Other-Repos
    runs-on: ubuntu-latest
    outputs:
      updates: ${{ steps.nvcheck.outputs.updates }}
    steps:
      - name: Check out the codebase.
        uses: actions/checkout@main

      - name: Pull base image.
        run: docker pull quay.io/aminvakil/archlinux:latest

      - name: Run a container of base image and mount package on it.
        run: |
          container_id=$(mktemp)
          docker run --detach --privileged --cgroup-parent=docker.slice --cgroupns private --tmpfs /tmp --tmpfs /run --tmpfs /run/lock -v "${PWD}":/nvchecker quay.io/aminvakil/archlinux:latest > "${container_id}"
          printf 'container_id=%s\n' "$container_id" >> "$GITHUB_ENV"

      - name: pacman -Syu
        run: docker exec "$(cat ${container_id})" pacman -Syu --noconfirm

      - name: Install nvchecker and git.
        run: docker exec "$(cat ${container_id})" pacman -S nvchecker git jq pyalpm --noconfirm

      - name: Nvcheck!
        id: nvcheck
        run: |
          docker exec "$(cat ${container_id})" nvchecker --failures -c /nvchecker/docker.toml
          docker_nvcmp_json=$(docker exec "$(cat ${container_id})" nvcmp -j -c /nvchecker/docker.toml)
          updates=$(echo "$docker_nvcmp_json" | docker exec -i "$(cat ${container_id})" jq -c '
            def target($repository; $image; $source; $dockerfile_location):
              .[] | select(.name == $source) | {
                repository: $repository,
                image: $image,
                source: $source,
                dockerfile_location: $dockerfile_location,
                oldver: .oldver,
                newver: .newver
              };
            [
              target("docker-archlinux"; "archlinux"; "archlinux"; ""),
              target("docker-os-systemd"; "debian11"; "debian11"; "images/"),
              target("docker-os-systemd"; "debian12"; "debian12"; "images/"),
              target("docker-os-systemd"; "debian13"; "debian13"; "images/"),
              target("docker-os-systemd"; "ubuntu22"; "ubuntu22"; "images/"),
              target("docker-os-systemd"; "ubuntu24"; "ubuntu24"; "images/"),
              target("docker-alpine-ftp-server-tls"; "alpine"; "alpine"; ""),
              target("docker-alpine-nfs-server"; "alpine"; "alpine"; ""),
              target("prometheus_bot"; "alpine"; "alpine"; ""),
              target("prometheus_bot"; "golang"; "golang1.26"; ""),
              target("docker-squid"; "alpine"; "alpine"; ""),
              target("docker-ocserv"; "alpine"; "alpine"; "")
            ]
          ')
          printf 'updates<<EOF\n%s\nEOF\n' "$updates" >> "$GITHUB_OUTPUT"

      - name: Stop and remove container forcefully.
        run: docker rm -f "$(cat ${container_id})"

  Create_Docker_Other_Repos_Pull_Requests:
    name: Create ${{ matrix.update.image }} Pull Request for ${{ matrix.update.repository }}
    needs: Docker_Other_Repos
    if: needs.Docker_Other_Repos.outputs.updates != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        update: ${{ fromJson(needs.Docker_Other_Repos.outputs.updates) }}
    steps:
      - uses: actions/checkout@main
        with:
          repository: "aminvakil/${{ matrix.update.repository }}"
          path: "./${{ matrix.update.repository }}"

      - name: Bump version
        run: |
          before="${{ matrix.update.oldver }}"
          after="${{ matrix.update.newver }}"
          commit_message="$before -> $after"
          printf 'commit_message=%s\n' "$commit_message" >> "$GITHUB_ENV"
          sed -i "s/${before/\./\\.}$/$after/g" "${{ matrix.update.repository }}/${{ matrix.update.dockerfile_location }}"Dockerfile*
          sed -i "s/${before/\./\\.} AS /$after AS /g" "${{ matrix.update.repository }}/${{ matrix.update.dockerfile_location }}"Dockerfile*

      - uses: actions/create-github-app-token@main
        id: generate-token
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: "${{ github.repository_owner }}"
          repositories: "${{ matrix.update.repository }}"

      - name: Create ${{ matrix.update.image }} Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.generate-token.outputs.token }}
          path: "./${{ matrix.update.repository }}"
          commit-message: ${{ env.commit_message }}
          branch: ${{ matrix.update.image }}
          delete-branch: true
          title: Bump ${{ matrix.update.image }}
          body: ${{ env.commit_message }}
